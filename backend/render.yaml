services:
  - type: web
    name: upalpha-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DATABASE_URL
        sync: false   # set manually in dashboard (Neon URL)
      - key: SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
